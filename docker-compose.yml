# Multica - Dokploy Docker Compose
# 
# Tipo recomendado en Dokploy: docker-compose
# 
# Configura los dominios desde la UI de Dokploy:
#   - frontend (puerto 3000): app.tudominio.com
#   - backend (puerto 8080): api.tudominio.com
#
# NO uses "ports:" — Dokploy/Traefik se encarga del enrutamiento.
# Solo usa "expose:" para que Traefik descubra los puertos internos.

name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/multica-ai/multica-backend:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      METRICS_ADDR: ${METRICS_ADDR:-}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      APP_ENV: ${APP_ENV:-production}
      MULTICA_DEV_VERIFICATION_CODE: ${MULTICA_DEV_VERIFICATION_CODE:-}
      MULTICA_APP_URL: ${MULTICA_APP_URL}
      MULTICA_PUBLIC_URL: ${MULTICA_PUBLIC_URL}
      MULTICA_TRUSTED_PROXIES: ${MULTICA_TRUSTED_PROXIES:-127.0.0.1/32}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      REDIS_URL: ${REDIS_URL:-}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-5}
      RATE_LIMIT_AUTH_VERIFY: ${RATE_LIMIT_AUTH_VERIFY:-20}
      REALTIME_METRICS_TOKEN: ${REALTIME_METRICS_TOKEN:-}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-2592000}
    volumes:
      - backend_uploads:/app/data/uploads
    restart: unless-stopped

  frontend:
    image: ghcr.io/multica-ai/multica-web:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      - backend
    expose:
      - "3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    restart: unless-stopped

  agent-worker:
    build:
      context: ./agent-worker
      dockerfile: Dockerfile
    environment:
      MULTICA_SERVER_URL: ${MULTICA_SERVER_URL}
      MULTICA_APP_URL: ${MULTICA_APP_URL}
      MULTICA_AUTH_TOKEN: ${MULTICA_AUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - agent_workspaces:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # =============================================================================
  # Kimi + Multica Agent Worker
  # =============================================================================
  # Contenedor dedicado con Kimi CLI (Moonshot AI) + demonio de Multica.
  # Ideal para tener un entorno de ejecución de código en la nube siempre activo.
  #
  # Uso:
  #   docker compose up -d kimi-worker
  #   docker exec -it multica-kimi-worker-1 bash
  #   → dentro: `kimi` para iniciar el agente interactivo
  # =============================================================================
  kimi-worker:
    build:
      context: ./agent-worker
      dockerfile: Dockerfile
    container_name: multica-kimi-worker
    environment:
      # --- Multica ---
      MULTICA_SERVER_URL: ${MULTICA_SERVER_URL}
      MULTICA_APP_URL: ${MULTICA_APP_URL}
      MULTICA_AUTH_TOKEN: ${MULTICA_AUTH_TOKEN:-}
      # --- Kimi (Moonshot AI) ---
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${KIMI_API_KEY:-}
      # --- Opcional: otras APIs para el agente ---
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      # Workspace persistente para proyectos
      - kimi_workspaces:/workspace
      # Acceso al Docker del host (Kimi puede lanzar contenedores)
      - /var/run/docker.sock:/var/run/docker.sock
      # Configuraciones persistentes
      - kimi_config:/root/.config
      - kimi_cache:/root/.cache
    # Modo interactivo para poder hacer `docker exec -it ... bash`
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Healthcheck interno
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata_v2:
  backend_uploads:
  agent_workspaces:
  kimi_workspaces:
  kimi_config:
  kimi_cache:
